services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: library_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d library_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: change-this-secret
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://postgres:postgres@db:5432/library_management
      BACKEND_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "false"
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      SESSION_COOKIE_SECURE: "false"
      CSRF_COOKIE_SECURE: "false"
      REFRESH_COOKIE_SECURE: "false"
      REFRESH_COOKIE_SAMESITE: Lax
      RUN_MIGRATIONS: "true"
      COLLECT_STATIC: "true"
      CREATE_SUPERUSER: "true"
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin123456
      DJANGO_SUPERUSER_ROLE: admin
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      PORT: "3000"
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
